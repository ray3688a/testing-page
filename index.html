<script>
// =============================================

// --- AUDIO ---
var audioCtx = null;
function playSound(type) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        var now = audioCtx.currentTime;
        if (type === 'correct') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(523, now);
            osc.frequency.setValueAtTime(659, now + 0.12);
            osc.frequency.setValueAtTime(784, now + 0.24);
            osc.frequency.setValueAtTime(1047, now + 0.36);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
            osc.start(now); osc.stop(now + 0.55);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(250, now);
            osc.frequency.linearRampToValueAtTime(120, now + 0.35);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.15, now + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        } else {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(700, now);
            osc.frequency.exponentialRampToValueAtTime(200, now + 0.08);
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
            osc.start(now); osc.stop(now + 0.08);
        }
    } catch(e) {}
}

// --- TTS (Single Definition) ---
function speakText(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    var lang = document.getElementById('tts-lang').value;
    var utt = new SpeechSynthesisUtterance(text);
    utt.lang = lang;
    utt.pitch = 1.1;
    utt.rate = 0.92;
    var voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) {
        var match = null;
        if (lang === 'zh-HK') {
            for (var i = 0; i < voices.length; i++) {
                var v = voices[i];
                var vl = v.lang.toLowerCase();
                var vn = v.name.toLowerCase();
                if (vl.indexOf('zh-hk') === 0 || vn.indexOf('sinji') >= 0 || vn.indexOf('cantonese') >= 0 || vn.indexOf('hong kong') >= 0) {
                    match = v; break;
                }
            }
        } else {
            for (var i = 0; i < voices.length; i++) {
                var v = voices[i];
                var vl = v.lang.toLowerCase();
                var vn = v.name.toLowerCase();
                if (vl.indexOf('zh-tw') === 0 || vl.indexOf('zh-cn') === 0 || vn.indexOf('meijia') >= 0 || vn.indexOf('tingting') >= 0) {
                    match = v; break;
                }
            }
        }
        if (!match) {
            for (var i = 0; i < voices.length; i++) {
                if (voices[i].lang.toLowerCase().indexOf('zh') === 0) { match = voices[i]; break; }
            }
        }
        if (match) { utt.voice = match; utt.lang = match.lang; }
    }
    setTimeout(function() { window.speechSynthesis.speak(utt); }, 60);
}

function speakHeader() {
    var ex = getExercise(currentDay);
    if (ex) speakText(ex.audioText);
}
function speakMascot() {
    speakText(document.getElementById('mascot-msg').textContent);
}
function saveLang() {
    localStorage.setItem('hc_lang', document.getElementById('tts-lang').value);
    playSound('click');
}

// --- SHUFFLE ---
function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
}

// --- INIT ---
window.addEventListener('DOMContentLoaded', function() {
    loadState();
    buildCalendar();
    loadExercise(currentDay);
    var savedFont = localStorage.getItem('hc_font') || 'normal';
    applyFont(savedFont);
    if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };
    }
});

window.addEventListener('click', function() {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}, { once: true });

// --- STATE ---
function loadState() {
    try { progress = JSON.parse(localStorage.getItem('hc_progress') || '{}'); } catch(e) { progress = {}; }
    var lang = localStorage.getItem('hc_lang');
    if (lang) document.getElementById('tts-lang').value = lang;
    updateStars();
}

function saveState() {
    localStorage.setItem('hc_progress', JSON.stringify(progress));
    updateStars();
}

function updateStars() {
    var count = 0;
    for (var i = 1; i <= 14; i++) { if (progress[i]) count++; }
    document.getElementById('star-count').textContent = count;
}

function resetAll() {
    playSound('click');
    if (!confirm('確定要重設所有進度嗎？')) return;
    progress = {}; userAnswers = {}; reorderState = {};
    revealed = false; finalDone = false;
    saveState();
    buildCalendar();
    loadExercise(1);
    setMascot('neutral', '一切從頭開始！Hayden 和 Celine 陪你一起加油！');
}

// --- FONT ---
function setFont(mode) {
    playSound('click');
    localStorage.setItem('hc_font', mode);
    applyFont(mode);
}

function applyFont(mode) {
    document.querySelectorAll('.font-btn').forEach(function(b) {
        b.className = 'font-btn px-3 py-1 text-xs font-black rounded-full text-purple-600 hover:bg-purple-100 transition-all';
    });
    var btn = document.getElementById('font-' + mode);
    if (btn) btn.className = 'font-btn px-3 py-1 text-xs font-black rounded-full bg-purple-500 text-white transition-all';
    document.getElementById('main-area').style.fontSize = (mode === 'large') ? '1.35rem' : '1rem';
}

// --- CALENDAR ---
function buildCalendar() {
    var grid = document.getElementById('calendar-grid');
    if (!grid) return;
    grid.innerHTML = '';
    for (var d = 1; d <= 14; d++) {
        var done = !!progress[d];
        var active = (d === currentDay);
        var icon = dayIcons[d - 1];
        var el = document.createElement('div');
        var cls = 'relative flex flex-col items-center justify-center p-2 rounded-xl border-2 shadow-sm transition-all cursor-pointer ';
        if (active) cls += 'bg-purple-500 border-purple-600 text-white';
        else if (done) cls += 'bg-purple-50 border-purple-200 text-purple-700';
        else cls += 'bg-white border-slate-200 text-slate-600 hover:bg-purple-50';
        el.className = cls;
        el.innerHTML = (done ? '<span class="absolute top-0.5 right-0.5 text-amber-400 text-xs"><i class="fa-solid fa-star"></i></span>' : '') +
            '<span class="text-lg">' + icon + '</span>' +
            '<span class="text-xs opacity-70">Day</span>' +
            '<span class="text-sm font-black">' + d + '</span>';
        (function(day) { el.onclick = function() { selectDay(day); }; })(d);
        grid.appendChild(el);
    }
}

function selectDay(d) {
    playSound('click');
    currentDay = d;
    revealed = false;
    reorderState = {};
    buildCalendar();
    loadExercise(d);
    setMascot('thinking', '第 ' + d + ' 天來了！仔細看清楚題目，你一定可以的！');
}

// --- LOAD EXERCISE ---
function loadExercise(d) {
    var ex = getExercise(d);
    if (!ex) { console.error('Exercise not found for day', d); return; }

    document.getElementById('day-badge').textContent = '第 ' + d + ' 天挑戰';
    document.getElementById('ex-title').textContent = ex.title;
    document.getElementById('ex-tip').innerHTML = '<strong>💡 精讀小秘訣：</strong>' + ex.tip;

    var submitBtn = document.getElementById('submit-btn');
    var nextBtn = document.getElementById('next-btn');
    var statusMsg = document.getElementById('status-msg');

    if (revealed) {
        submitBtn.style.display = 'none';
        nextBtn.classList.remove('hidden');
    } else {
        submitBtn.style.display = '';
        nextBtn.classList.add('hidden');
    }
    statusMsg.classList.add('hidden');

    var ws = document.getElementById('workspace');
    ws.innerHTML = '';

    if (ex.type === 'cloze') renderCloze(ex, ws);
    else if (ex.type === 'pairing') renderPairing(ex, ws);
    else if (ex.type === 'punctuation') renderPunctuation(ex, ws);
    else if (ex.type === 'reorder') renderReorder(ex, ws);
    else if (ex.type === 'reading_comp') renderReading(ex, ws);
}

// --- ANSWER HELPERS ---
function getAns(qId, sub) {
    var key = currentDay + '_' + qId;
    var val = userAnswers[key];
    if (sub !== undefined) return (val && typeof val === 'object') ? (val[sub] || '') : '';
    return (typeof val === 'string') ? val : '';
}

function setAns(qId, val, sub) {
    var key = currentDay + '_' + qId;
    if (sub !== undefined) {
        if (!userAnswers[key] || typeof userAnswers[key] !== 'object') userAnswers[key] = {};
        userAnswers[key][sub] = val;
    } else {
        userAnswers[key] = val;
    }
}

// --- RENDER CLOZE ---
function renderCloze(ex, ws) {
    var wrap = document.createElement('div');
    wrap.className = 'space-y-3';

    for (var i = 0; i < ex.questions.length; i++) {
        var q = ex.questions[i];
        var saved = getAns(q.id);
        var card = document.createElement('div');
        card.className = 'p-4 bg-slate-50 rounded-xl border-2 border-slate-100 space-y-3';

        // Display line
        var display = revealed ? q.answer : (saved || '？');
        var spanCls = 'border-b-2 px-3 inline-block font-black ';
        if (revealed) spanCls += (saved === q.answer) ? 'text-emerald-600 border-emerald-400' : 'text-red-600 border-red-400';
        else spanCls += 'text-purple-600 border-purple-400';

        var row = document.createElement('div');
        row.className = 'flex items-start justify-between gap-2 flex-wrap';

        var textDiv = document.createElement('div');
        textDiv.className = 'flex items-start gap-2 flex-grow';
        textDiv.innerHTML = '<span class="bg-purple-500 text-white text-xs font-black rounded-full w-5 h-5 flex items-center justify-center flex-shrink-0 mt-0.5">' + (i+1) + '</span>' +
            '<span class="font-bold text-slate-800">' + q.text.replace('（ ）', '') + ' <span id="ca-' + q.id + '" class="' + spanCls + '">' + display + '</span></span>';
        row.appendChild(textDiv);

        var ttsBtn = document.createElement('button');
        ttsBtn.className = 'text-xs text-purple-600 bg-purple-50 border border-purple-200 px-2 py-1 rounded-full flex items-center gap-1 hover:bg-purple-100 flex-shrink-0';
        ttsBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i> 讀題';
        (function(qt) { ttsBtn.onclick = function() { speakText(qt); }; })(q.text);
        row.appendChild(ttsBtn);
        card.appendChild(row);

        // Option buttons
        var grid = document.createElement('div');

// --- RENDER PAIRING ---
function renderPairing(ex, ws) {
    var wrap = document.createElement('div');
    wrap.className = 'space-y-4';

    for (var qi = 0; qi < ex.questions.length; qi++) {
        var q = ex.questions[qi];
        var card = document.createElement('div');
        card.className = 'p-5 rounded-2xl border-2 border-slate-100 bg-slate-50 space-y-1';

        var opts = shuffle(q.options);
        var ansIdx = 0;

        for (var li = 0; li < q.lines.length; li++) {
            var lineData = q.lines[li];
            var lineText = lineData.text;
            var row = document.createElement('div');
            row.className = 'py-2 border-b border-dashed border-purple-100 last:border-0 flex flex-wrap items-center justify-between gap-2';

            var textDiv = document.createElement('div');
            textDiv.className = 'font-bold text-slate-800 flex-grow flex flex-wrap items-center leading-loose';

            // Parse [0], [1] etc.
            var parts = lineText.split(/\[(\d+)\]/);
            for (var pi = 0; pi < parts.length; pi++) {
                var part = parts[pi];
                if (/^\d+\$/.test(part)) {
                    // This is a slot index
                    var slotIdx = parseInt(part);
                    var saved = getAns(q.id, slotIdx);
                    var expected = q.answers[slotIdx];
                    var sel = document.createElement('select');
                    var sCls = 'slot-select';
                    if (revealed) sCls += (saved === expected) ? ' correct-slot' : ' wrong-slot';
                    else if (saved) sCls += ' answered';
                    sel.className = sCls;
                    if (revealed) sel.disabled = true;

                    var defOpt = document.createElement('option');
                    defOpt.value = '';
                    defOpt.textContent = revealed ? expected : '選擇';
                    sel.appendChild(defOpt);

                    for (var oi2 = 0; oi2 < opts.length; oi2++) {
                        var o = opts[oi2];
                        var oEl = document.createElement('option');
                        oEl.value = o; oEl.textContent = o;
                        if (revealed ? o === expected : o === saved) oEl.selected = true;
                        sel.appendChild(oEl);
                    }

                    if (!revealed) {
                        (function(qid, sidx, selEl) {
                            selEl.onchange = function() {
                                playSound('click');
                                setAns(qid, selEl.value, sidx);
                                selEl.className = 'slot-select answered';
                                setMascot('thinking', '好！填了「' + selEl.value + '」，繼續加油！');
                            };
                        })(q.id, slotIdx, sel);
                    }
                    textDiv.appendChild(sel);
                } else {
                    var span = document.createElement('span');
                    span.textContent = part;
                    textDiv.appendChild(span);
                }
            }

            row.appendChild(textDiv);

            var tBtn = document.createElement('button');
            tBtn.className = 'text-xs text-purple-600 bg-purple-50 border border-purple-200 px-2 py-1 rounded-full hover:bg-purple-100 font-bold flex items-center gap-1 flex-shrink-0';
            tBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
            var cleanLine = lineText.replace(/\[\d+\]/g, ' 填空 ');
            (function(lt) { tBtn.onclick = function() { speakText(lt); }; })(cleanLine);
            row.appendChild(tBtn);
            card.appendChild(row);
        }
        wrap.appendChild(card);
    }
    ws.appendChild(wrap);
}

// --- RENDER PUNCTUATION ---
function renderPunctuation(ex, ws) {
    var wrap = document.createElement('div');
    wrap.className = 'space-y-3';

    for (var qi = 0; qi < ex.questions.length; qi++) {
        var q = ex.questions[qi];
        var card = document.createElement('div');
        card.className = 'p-4 bg-slate-50 rounded-xl border-2 border-slate-100 font-bold text-slate-800 leading-loose text-base';

        // Number badge
        var nbadge = document.createElement('span');
        nbadge.className = 'inline-flex items-center justify-center bg-purple-500 text-white text-xs font-black rounded-full w-5 h-5 mr-2 align-middle';
        nbadge.textContent = qi + 1;
        card.appendChild(nbadge);

        // Sentence text
        var sentSpan = document.createElement('span');
        sentSpan.textContent = q.sentence;
        card.appendChild(sentSpan);

        // First slots
        appendPuncSlots(card, q.slots, q.id);

        // After text
        if (q.after) {
            var afterSpan = document.createElement('span');
            afterSpan.textContent = q.after;
            card.appendChild(afterSpan);
        }

        // Mid slots
        if (q.midSlots) appendPuncSlots(card, q.midSlots, q.id);

        // Last text
        if (q.last) {
            var lastSpan = document.createElement('span');
            lastSpan.textContent = q.last;
            card.appendChild(lastSpan);
        }

        // End slots
        if (q.endSlots && q.endSlots.length > 0) appendPuncSlots(card, q.endSlots, q.id);

        ws.appendChild(card);
    }
}

function appendPuncSlots(container, slots, qId) {
    if (!slots) return;
    for (var si = 0; si < slots.length; si++) {
        var s = slots[si];
        var saved = getAns(qId, s.id);
        var sel = document.createElement('select');
        var sCls = 'slot-select';
        if (revealed) sCls += (saved === s.ans) ? ' correct-slot' : ' wrong-slot';
        else if (saved) sCls += ' answered';
        sel.className = sCls;
        if (revealed) sel.disabled = true;

        var defOpt = document.createElement('option');
        defOpt.value = '';
        defOpt.textContent = revealed ? s.ans : '？';
        sel.appendChild(defOpt);

        var shuffledOpts = shuffle(s.opts);
        for (var oi = 0; oi < shuffledOpts.length; oi++) {
            var o = shuffledOpts[oi];
            var oEl = document.createElement('option');
            oEl.value = o; oEl.textContent = o;
            if (revealed ? o === s.ans : o === saved) oEl.selected = true;
            sel.appendChild(oEl);
        }

        if (!revealed) {
            (function(qid, sid, selEl, correctAns) {
                selEl.onchange = function() {
                    playSound('click');
                    setAns(qid, selEl.value, sid);
                    selEl.className = 'slot-select answered';
                    setMascot('thinking', '標點符號選了「' + selEl.value + '」！繼續！');
                };
            })(qId, s.id, sel, s.ans);
        }
        container.appendChild(sel);
    }
}

function clickReorder(qId, idx, word) {
    if (revealed) return;
    playSound('click');
    var list = reorderState[qId] || [];
    var existIdx = -1;
    for (var i = 0; i < list.length; i++) { if (list[i].idx === idx) { existIdx = i; break; } }

    if (existIdx > -1) {
        list.splice(existIdx, 1);
        var btn = document.getElementById('rb-' + qId + '-' + idx);
        if (btn) {
            btn.className = 'bg-white text-purple-800 border-2 border-purple-200 px-4 py-2 rounded-xl font-black text-sm hover:bg-purple-50 transition-all';
            btn.disabled = false;
            (function(qid, bidx, bw) { btn.onclick = function() { clickReorder(qid, bidx, bw); }; })(qId, idx, word);
        }
    } else {
        list.push({ idx: idx, w: word });
        var btn2 = document.getElementById('rb-' + qId + '-' + idx);
        if (btn2) { btn2.className = 'bg-slate-100 text-slate-400 border-2 border-slate-200 px-4 py-2 rounded-xl font-black text-sm opacity-50 cursor-not-allowed'; btn2.disabled = true; }
    }
    reorderState[qId] = list;
    renderReorderTarget(qId);
}

function renderReorderTarget(qId) {
    var t = document.getElementById('rt-' + qId);
    if (!t) return;
    var list = reorderState[qId] || [];
    if (list.length === 0) {
        t.innerHTML = '<span class="text-xs text-slate-400 italic">點選下方詞語卡片，句子會自動拼合！</span>';
        return;
    }
    t.innerHTML = '';
    for (var i = 0; i < list.length; i++) {
        var item = list[i];
        var b = document.createElement('div');
        b.className = 'bg-gradient-to-r from-purple-500 to-pink-500 text-white font-black px-4 py-2 rounded-xl flex items-center gap-2';
        var wordSpan = document.createElement('span');
        wordSpan.textContent = item.w;
        b.appendChild(wordSpan);
        var xBtn = document.createElement('button');
        xBtn.className = 'text-pink-200 hover:text-white';
        xBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
        (function(qid, bidx, bw) {
            xBtn.onclick = function(e) { e.stopPropagation(); clickReorder(qid, bidx, bw); };
        })(qId, item.idx, item.w);
        b.appendChild(xBtn);
        t.appendChild(b);
    }
}

function clearReorder(qId) {
    playSound('click');
    var list = reorderState[qId] || [];
    for (var i = 0; i < list.length; i++) {
        var item = list[i];
        var btn = document.getElementById('rb-' + qId + '-' + item.idx);
        if (btn) {
            btn.className = 'bg-white text-purple-800 border-2 border-purple-200 px-4 py-2 rounded-xl font-black text-sm hover:bg-purple-50 transition-all';
            btn.disabled = false;
            (function(qid, bidx, bw) { btn.onclick = function() { clickReorder(qid, bidx, bw); }; })(qId, item.idx, item.w);
        }
    }
    reorderState[qId] = [];
    renderReorderTarget(qId);
}

// --- SUBMIT ---
function submitAnswers() {
    var ex = getExercise(currentDay);
    if (!ex) return;

    var total = 0;
    var correct = 0;

    if (ex.type === 'cloze' || ex.type === 'reading_comp') {
        for (var i = 0; i < ex.questions.length; i++) {
            var q = ex.questions[i];
            total++;
            if (getAns(q.id) === q.answer) correct++;
        }
    } else if (ex.type === 'pairing') {
        for (var i = 0; i < ex.questions.length; i++) {
            var q = ex.questions[i];
            total++;
            var allMatch = true;
            for (var j = 0; j < q.answers.length; j++) {
                if (getAns(q.id, j) !== q.answers[j]) { allMatch = false; break; }
            }
            if (allMatch) correct++;
        }
    } else if (ex.type === 'punctuation') {
        for (var i = 0; i < ex.questions.length; i++) {
            var q = ex.questions[i];
            total++;
            var allSlots = [];
            if (q.slots) allSlots = allSlots.concat(q.slots);
            if (q.midSlots) allSlots = allSlots.concat(q.midSlots);
            if (q.endSlots) allSlots = allSlots.concat(q.endSlots);
            var allMatch = true;
            for (var j = 0; j < allSlots.length; j++) {
                if (getAns(q.id, allSlots[j].id) !== allSlots[j].ans) { allMatch = false; break; }
            }
            if (allMatch) correct++;
        }
    } else if (ex.type === 'reorder') {
        for (var i = 0; i < ex.questions.length; i++) {
            var q = ex.questions[i];
            total++;
            var list = reorderState[q.id] || [];
            var userSeq = '';
            for (var j = 0; j < list.length; j++) userSeq += list[j].w;
            var correctSeq = q.correct.join('');
            if (userSeq === correctSeq) correct++;
        }
    }

    var allCorrect = (correct === total && total > 0);
    revealed = true;
    loadExercise(currentDay);

    if (allCorrect) {
        playSound('correct');
        progress[currentDay] = true;
        saveState();
        buildCalendar();
        document.getElementById('status-msg').classList.remove('hidden');
        setMascot('happy', '全部答對了！Hayden 和 Celine 為你歡呼！你太棒了！');
        speakText('答對了，做得非常好！');
        triggerConfetti();
        showModal('第 ' + currentDay + ' 天完成！🌟', '你答對了全部 ' + total + ' 題！Hayden 和 Celine 為你鼓掌！繼續加油！');
    } else {
        playSound('wrong');
        setMascot('sad', '答對了 ' + correct + ' / ' + total + ' 題。不要灰心！看看正確答案，下次一定更好！');
        speakText('唔緊要，睇下正確答案，繼續努力！');
    }
}

    var eyeHtml, mouthHtml;
    if (state === 'happy') {
        eyeHtml = '<path d="M28 28 Q33 22 38 28" fill="none" stroke="#2D3748" stroke-width="4" stroke-linecap="round"/><path d="M42 28 Q47 22 52 28" fill="none" stroke="#2D3748" stroke-width="4" stroke-linecap="round"/>';
        mouthHtml = '<path d="M32 36 Q40 44 48 36 Z" fill="#FF8A8A" stroke="#2D3748" stroke-width="2"/>';
    } else if (state === 'sad') {
        eyeHtml = '<line x1="28" y1="25" x2="36" y2="31" stroke="#2D3748" stroke-width="4" stroke-linecap="round"/><line x1="52" y1="25" x2="44" y2="31" stroke="#2D3748" stroke-width="4" stroke-linecap="round"/>';
        mouthHtml = '<path d="M34 40 Q40 34 46 40" fill="none" stroke="#2D3748" stroke-width="3" stroke-linecap="round"/>';
    } else if (state === 'thinking') {
        eyeHtml = '<circle cx="33" cy="28" r="3.5" fill="#2D3748"/><circle cx="47" cy="28" r="3.5" fill="#2D3748"/><circle cx="32" cy="27" r="1.2" fill="white"/><circle cx="46" cy="27" r="1.2" fill="white"/>';
        mouthHtml = '<path d="M35 37 L45 37" stroke="#2D3748" stroke-width="2.5" stroke-linecap="round"/>';
    } else {
        eyeHtml = '<circle cx="33" cy="28" r="3.5" fill="#2D3748"/><circle cx="47" cy="28" r="3.5" fill="#2D3748"/><circle cx="32" cy="27" r="1.2" fill="white"/><circle cx="46" cy="27" r="1.2" fill="white"/>';
        mouthHtml = '<path d="M35 36 Q40 41 45 36" fill="none" stroke="#2D3748" stroke-width="2.5" stroke-linecap="round"/>';
    }
    hE.innerHTML = eyeHtml; cE.innerHTML = eyeHtml;
    hM.innerHTML = mouthHtml; cM.innerHTML = mouthHtml;
}

// --- MODAL ---
function showModal(title, body) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').textContent = body;
    var modal = document.getElementById('reward-modal');
    modal.style.display = 'flex';
}

function closeModal() {
    document.getElementById('reward-modal').style.display = 'none';
    if (!finalDone && currentDay < 14) goNext();
}

// --- CONFETTI ---
function triggerConfetti() {
    var area = document.getElementById('confetti-area');
    area.innerHTML = '';
    var colors = ['#a855f7','#ec4899','#f59e0b','#3b82f6','#10b981'];
    for (var i = 0; i < 35; i++) {
        var el = document.createElement('div');
        var size = Math.random() * 10 + 5;
        el.style.position = 'absolute';
        el.style.left = (Math.random() * 100) + '%';
        el.style.top = (Math.random() * 100) + '%';
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
        el.style.opacity = '0.8';
        el.className = 'animate-ping';
        el.style.animationDuration = (Math.random() * 1.5 + 0.5) + 's';
        area.appendChild(el);
    }
}
</script>
