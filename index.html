<script>
// ============================================================
// HAYDEN & CELINE 中文樂 — Clean JavaScript (Zero Duplicate Bug)
// ============================================================

// --- AUDIO ENGINE ---
let audioCtx = null;

function playSound(type) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'correct') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(523, now);
            osc.frequency.setValueAtTime(659, now + 0.12);
            osc.frequency.setValueAtTime(784, now + 0.24);
            osc.frequency.setValueAtTime(1047, now + 0.36);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
            osc.start(now); osc.stop(now + 0.55);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(250, now);
            osc.frequency.linearRampToValueAtTime(120, now + 0.35);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.15, now + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        } else {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(700, now);
            osc.frequency.exponentialRampToValueAtTime(200, now + 0.08);
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
            osc.start(now); osc.stop(now + 0.08);
        }
    } catch(e) {}
}

// --- TTS ENGINE (Single definition, no duplicates) ---
function speakText(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();

    const lang = document.getElementById('tts-lang').value;
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = lang;
    utt.pitch = 1.1;
    utt.rate = 0.92;

    const voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) {
        let match = null;
        if (lang === 'zh-HK') {
            match = voices.find(v => {
                const l = v.lang.toLowerCase(), n = v.name.toLowerCase();
                return l.startsWith('zh-hk') || n.includes('sinji') || n.includes('sin-ji') || n.includes('cantonese') || n.includes('hong kong');
            });
        } else {
            match = voices.find(v => {
                const l = v.lang.toLowerCase(), n = v.name.toLowerCase();
                return l.startsWith('zh-tw') || l.startsWith('zh-cn') || n.includes('meijia') || n.includes('taiwan') || n.includes('tingting');
            });
        }
        if (!match) {
            match = voices.find(v => v.lang.toLowerCase().startsWith('zh'));
        }
        if (match) { utt.voice = match; utt.lang = match.lang; }
    }

    setTimeout(() => window.speechSynthesis.speak(utt), 60);
}

function speakHeader() { const ex = exercises[currentDay]; if (ex) speakText(ex.audioText); }
function speakMascot() { speakText(document.getElementById('mascot-msg').textContent); }
function saveLang() { localStorage.setItem('hc_lang', document.getElementById('tts-lang').value); playSound('click'); }

// --- UTILITIES ---
const shuffle = arr => {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
};

const dayIcons = ["🦁","🐯","🦊","🐨","🐼","🐸","🦜","🦋","🐬","🦄","🦒","🦩","🐙","🏆"];

// --- STATE ---
let currentDay = 1;
let progress = {};
let userAnswers = {};
let reorderState = {};
let revealed = false;
let finalDone = false;

// --- 14 DAYS CURRICULUM (Fresh Questions) ---
const exercises = {
    1: {
        title: "第一天：字的偏旁 🧩",
        tip: "漢字由不同的偏旁組合而成。偏旁是構成漢字的基本部件，認識偏旁有助識字！",
        type: "cloze",
        audioText: "第一天，字的偏旁。請選出正確的字。",
        questions: [
            { id:"q1", text:"氵+ 青 = ?", options:["清","請","晴","情"], answer:"清", hint:"與水有關，清水、清潔" },
            { id:"q2", text:"木 + 交 = ?", options:["校","較","效","皎"], answer:"校", hint:"上學的地方" },
            { id:"q3", text:"口 + 乃 = ?", options:["奶","吃","叫","奶"], answer:"吃", hint:"把食物放進嘴裡" },
            { id:"q4", text:"人 + 木 = ?", options:["休","体","林","伏"], answer:"休", hint:"休息、放假" },
            { id:"q5", text:"火 + 丁 = ?", options:["灯","燈","熱","烤"], answer:"灯", hint:"照明用的，夜晚開燈" }
        ]
    },
    2: {
        title: "第二天：名詞(一) 農曆新年 🧧",
        tip: "名詞是人物、地方或事物的名稱。例如：爸爸、香港、禮物。",
        type: "pairing",
        audioText: "第二天，名詞，農曆新年。請選詞填空。",
        questions: [
            {
                id:"q1",
                text:"農曆新年到了！（ 0 ）帶我去（ 1 ）買新衣服。我選了一件紅色的（ 2 ），因為紅色代表好運。回到家，（ 3 ）在廚房準備（ 4 ），大廳裏擺了（ 5 ），香味四溢。",
                options:["爸爸","商場","外套","媽媽","年夜飯","橘子"],
                answers:["爸爸","商場","外套","媽媽","年夜飯","橘子"]
            },
            {
                id:"q2",
                text:"除夕夜，全家人坐在一起看（ 0 ）。到了午夜，外面響起了（ 1 ）聲。第二天就是（ 2 ），親戚朋友都來拜年。長輩送給我一封（ 3 ），裏面有（ 4 ），我開心極了！",
                options:["電視","鞭炮","大年初一","利是","壓歲錢"],
                answers:["電視","鞭炮","大年初一","利是","壓歲錢"]
            }
        ]
    },
    3: {
        title: "第三天：動詞(一) 我的一天 🌞",
        tip: "動詞表示動作或行為，如：走、說、唱。句子中的動詞說明「做甚麼」。",
        type: "pairing",
        audioText: "第三天，動詞，我的一天。請選出正確的動詞填空。",
        questions: [
            {
                id:"q1",
                text:"1. 早上，我（ 0 ）了個懶腰，然後（ 1 ）牀起來。\n2. 媽媽叫我快點（ 2 ）臉和（ 3 ）牙，否則上學要遲到了。\n3. 我把書包（ 4 ）好，然後向學校（ 5 ）去。\n4. 到了學校，同學們都在操場上（ 6 ）遊戲。",
                options:["伸","起","洗","刷","整理","走","玩"],
                answers:["伸","起","洗","刷","整理","走","玩"]
            },
            {
                id:"q2",
                text:"5. 上課了，老師叫我們（ 0 ）書本，認真（ 1 ）課。\n6. 下課時，同學（ 2 ）我一起（ 3 ）球。\n7. 放學後，媽媽在校門口（ 4 ）我，我們一起（ 5 ）回家。",
                options:["翻開","上","約","踢","等","走"],
                answers:["翻開","上","約","踢","等","走"]
            }
        ]
    },
    4: {
        title: "第四天：形容詞 繽紛世界 🌈",
        tip: "形容詞用來描述事物的特徵，如大小、顏色、形狀、感覺等。",
        type: "pairing",
        audioText: "第四天，形容詞，繽紛世界。請選出最合適的形容詞填空。",
        questions: [
            {
                id:"q1",
                text:"1. 天上的月亮（ 0 ）的，像一個大盤子。\n2. 弟弟哭了，因為他摔倒了，膝蓋很（ 1 ）。\n3. 外婆煮的湯（ 2 ）又（ 3 ），我喝了一碗又一碗。\n4. 這條小路（ 4 ）得只能讓一個人通過。\n5. 夏天的太陽真（ 5 ），我要戴帽子遮陽。",
                options:["圓圓","痛","香","甜","窄","猛烈"],
                answers:["圓圓","痛","香","甜","窄","猛烈"]
            },
            {
                id:"q2",
                text:"6. 小貓的毛摸起來（ 0 ）又（ 1 ），讓人忍不住想多摸幾下。\n7. 這本書的故事非常（ 2 ），我一口氣讀完了。\n8. 爸爸的聲音（ 3 ），一說話大家都能聽到。\n9. 池塘裏的荷花開得（ 4 ），散發出淡淡的香氣。",
                options:["柔軟","光滑","有趣","洪亮","美麗"],
                answers:["柔軟","光滑","有趣","洪亮","美麗"]
            }
        ]

// --- INIT ---
window.addEventListener('DOMContentLoaded', () => {
    loadState();
    buildCalendar();
    loadExercise(currentDay);
    setFont(localStorage.getItem('hc_font') || 'normal');

    if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
});

window.addEventListener('click', () => {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}, { once: true });

// --- STATE MANAGEMENT ---
function loadState() {
    try { progress = JSON.parse(localStorage.getItem('hc_progress') || '{}'); } catch(e) { progress = {}; }
    const lang = localStorage.getItem('hc_lang');
    if (lang) document.getElementById('tts-lang').value = lang;
    updateStars();
}

function saveState() {
    localStorage.setItem('hc_progress', JSON.stringify(progress));
    updateStars();
}

function updateStars() {
    let count = 0;
    for (let i = 1; i <= 14; i++) { if (progress[i]) count++; }
    document.getElementById('star-count').textContent = count;
}

function resetAll() {
    playSound('click');
    if (!confirm('確定要重設所有進度嗎？')) return;
    progress = {}; userAnswers = {}; reorderState = {};
    revealed = false; finalDone = false;
    saveState();
    buildCalendar();
    loadExercise(1);
    setMascot('neutral', '👋 一切從頭開始！Hayden 和 Celine 陪你一起加油！');
}

// --- FONT ---
function setFont(mode) {
    playSound('click');
    localStorage.setItem('hc_font', mode);
    document.querySelectorAll('.font-btn').forEach(b => {
        b.className = 'font-btn px-3 py-1 text-xs font-black rounded-full text-purple-600 hover:bg-purple-100 transition-all';
    });
    const activeBtn = document.getElementById('font-' + mode);
    if (activeBtn) activeBtn.className = 'font-btn px-3 py-1 text-xs font-black rounded-full bg-purple-500 text-white transition-all';
    document.getElementById('main-area').style.fontSize = mode === 'large' ? '1.35rem' : '1rem';
}

// --- CALENDAR ---
function buildCalendar() {
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';
    for (let d = 1; d <= 14; d++) {
        const done = !!progress[d];
        const active = d === currentDay;
        const icon = dayIcons[d - 1];
        let cls = 'relative flex flex-col items-center justify-center p-2 rounded-xl border-2 shadow-sm transition-all btn-press cursor-pointer ';
        if (active) cls += 'bg-purple-500 border-purple-600 text-white scale-105 z-10';
        else if (done) cls += 'bg-purple-50 border-purple-200 text-purple-700';
        else cls += 'bg-white border-slate-200 text-slate-600 hover:bg-purple-50';

        const el = document.createElement('div');
        el.className = cls;
        el.onclick = () => selectDay(d);
        el.innerHTML = `
            \${done ? '<span class="absolute top-0.5 right-0.5 text-amber-400 text-[10px]"><i class="fa-solid fa-star"></i></span>' : ''}
            <span class="text-lg">\${icon}</span>
            <span class="text-[9px] opacity-70 uppercase">Day</span>
            <span class="text-sm font-black">\${d}</span>
        `;
        grid.appendChild(el);
    }
}

function selectDay(d) {
    playSound('click');
    currentDay = d;
    revealed = false;
    reorderState = {};
    buildCalendar();
    loadExercise(d);
    setMascot('thinking', `📖 第 \${d} 天來了！仔細看清楚題目，你一定可以的！`);
}

// --- LOAD EXERCISE ---
function loadExercise(d) {
    const ex = exercises[d];
    if (!ex) return;

    document.getElementById('day-badge').textContent = `第 \${d} 天挑戰`;
    document.getElementById('ex-title').textContent = ex.title;
    document.getElementById('ex-tip').innerHTML = `<strong>💡 精讀小秘訣：</strong>\${ex.tip}`;

    document.getElementById('submit-btn').classList.toggle('hidden', revealed);
    document.getElementById('next-btn').classList.toggle('hidden', !revealed);
    document.getElementById('status-msg').classList.add('hidden');

    const ws = document.getElementById('workspace');
    ws.innerHTML = '';

    if (ex.type === 'cloze') renderCloze(ex, ws);
    else if (ex.type === 'pairing') renderPairing(ex, ws);
    else if (ex.type === 'punctuation') renderPunctuation(ex, ws);
    else if (ex.type === 'reorder') renderReorder(ex, ws);
    else if (ex.type === 'reading_comp') renderReading(ex, ws);
}

// --- ANSWER STATE HELPERS ---
function getAnswer(qId, sub) {
    const key = `\${currentDay}_\${qId}`;
    const val = userAnswers[key];
    if (sub !== undefined) return (val && typeof val === 'object') ? (val[sub] || '') : '';
    return (typeof val === 'string') ? val : '';
}

function setAnswer(qId, val, sub) {
    const key = `\${currentDay}_\${qId}`;
    if (sub !== undefined) {
        if (!userAnswers[key] || typeof userAnswers[key] !== 'object') userAnswers[key] = {};
        userAnswers[key][sub] = val;
    } else {
        userAnswers[key] = val;
    }
}

// --- RENDER: CLOZE ---
function renderCloze(ex, ws) {
    const wrap = document.createElement('div');
    wrap.className = 'space-y-3';

    ex.questions.forEach((q, i) => {
        const card = document.createElement('div');
        card.className = 'p-4 bg-slate-50 rounded-xl border-2 border-slate-100 space-y-3';

        const saved = getAnswer(q.id);
        const display = revealed ? q.answer : (saved || '？');
        const underlineCls = revealed
            ? (saved === q.answer ? 'text-emerald-600 border-emerald-400 font-black' : 'text-red-600 border-red-400 font-black')
            : 'text-purple-600 border-purple-400 font-black';

        card.innerHTML = `
            <div class="flex items-start justify-between gap-2 flex-wrap">
                <div class="flex items-start gap-2 flex-grow">
                    <span class="bg-purple-500 text-white text-xs font-black rounded-full w-5 h-5 flex items-center justify-center flex-shrink-0 mt-0.5">\${i+1}</span>
                    <span class="font-bold text-slate-800">
                        \${q.text.replace('（ ）', '')} 
                        <span id="cloze-ans-\${q.id}" class="border-b-2 px-3 inline-block \${underlineCls}">\${display}</span>
                    </span>
                </div>
                <button onclick="speakText('\${q.text.replace(/'/g,"$'")}');" class="text-xs text-purple-600 bg-purple-50 border border-purple-200 px-2 py-1 rounded-full flex items-center gap-1 hover:bg-purple-100 flex-shrink-0">
                    <i class="fa-solid fa-volume-high"></i> 讀題
                </button>
            </div>
        `;

        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-2 md:grid-cols-4 gap-2';
        const opts = shuffle(q.options);
        opts.forEach(opt => {
            const btn = document.createElement('button');
            let cls = 'py-2 px-3 rounded-xl border-2 font-black text-sm transition-all btn-press ';
            if (revealed) {
                if (opt === q.answer) cls += 'bg-emerald-500 text-white border-emerald-600';
                else if (opt === saved) cls += 'bg-red-400 text-white border-red-500';
                else cls += 'bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed';
                btn.disabled = true;
            } else if (saved === opt) {
                cls += 'bg-purple-500 text-white border-purple-600';
            } else {
                cls += 'bg-white text-slate-700 border-slate-200 hover:bg-purple-50';
            }
            btn.className = cls;
            btn.textContent = opt;
            if (!revealed) btn.onclick = () => pickCloze(q.id, opt);
            grid.appendChild(btn);
        });
        card.appendChild(grid);

        if (q.hint && !revealed) {
            const hint = document.createElement('p');
            hint.className = 'text-xs text-purple-400 font-bold flex items-center gap-1';
            hint.innerHTML = `<i class="fa-solid fa-lightbulb"></i> 提示：\${q.hint}`;
            card.appendChild(hint);
        }

        wrap.appendChild(card);
    });
    ws.appendChild(wrap);
}

function pickCloze(qId, val) {
    if (revealed) return;
    playSound('click');
    setAnswer(qId, val);
    const span = document.getElementById('cloze-ans-' + qId);
    if (span) span.textContent = val;
    loadExercise(currentDay);
    setMascot('thinking', `🤔 你選了「\${val}」，繼續填完其他題目！`);
}

// --- RENDER: PAIRING ---
function renderPairing(ex, ws) {
    const wrap = document.createElement('div');
    wrap.className = 'space-y-4';

    ex.questions.forEach(q => {
        const card = document.createElement('div');
        card.className = 'p-5 rounded-2xl border-2 border-slate-100 bg-slate-50/50 space-y-1';

        const lines = q.text.split('\n');
        const opts = shuffle(q.options);
        let totalIdx = 0;

        lines.forEach(line => {
            const row = document.createElement('div');
            row.className = 'py-2 border-b border-dashed border-purple-100 last:border-0 flex flex-wrap items-center justify-between gap-2';

            const textPart = document.createElement('div');
            textPart.className = 'leading-loose font-bold text-slate-800 flex-grow flex flex-wrap items-center gap-1';

            const segments = line.split(/（\s*\d+\s*）/);
            segments.forEach((seg, si) => {
                const span = document.createElement('span');
                span.textContent = seg;
                textPart.appendChild(span);

                if (si < segments.length - 1) {
                    const idx = totalIdx;
                    const saved = getAnswer(q.id, idx);
                    const expected = q.answers[idx];

                    const sel = document.createElement('select');
                    sel.className = 'slot-select' + (revealed ? (saved === expected ? ' correct' : ' wrong') : (saved ? ' answered' : ''));

                    const def = document.createElement('option');
                    def.value = '';
                    def.textContent = revealed ? expected : '選擇';
                    sel.appendChild(def);

                    opts.forEach(o => {
                        const oel = document.createElement('option');
                        oel.value = o; oel.textContent = o;
                        if (revealed ? o === expected : o === saved) oel.selected = true;
                        sel.appendChild(oel);
                    });

                    if (revealed) sel.disabled = true;
                    else sel.onchange = () => { playSound('click'); setAnswer(q.id, sel.value, idx); sel.className = 'slot-select answered'; setMascot('thinking', `好！填了「\${sel.value}」，繼續加油！`); };

                    textPart.appendChild(sel);
                    totalIdx++;
                }
            });

            row.appendChild(textPart);

            const ttsBtn = document.createElement('button');
            ttsBtn.className = 'text-xs text-purple-600 bg-purple-50 border border-purple-200 px-2 py-1 rounded-full hover:bg-purple-100 font-bold flex items-center gap-1 flex-shrink-0';
            ttsBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i> 讀';
            const cleanLine = line.replace(/（\s*\d+\s*）/g, ' 填空 ');
            ttsBtn.onclick = () => speakText(cleanLine);
            row.appendChild(ttsBtn);

            card.appendChild(row);
        });

        wrap.appendChild(card);
    });
    ws.appendChild(wrap);
}

// --- RENDER: PUNCTUATION ---
function renderPunctuation(ex, ws) {
    const wrap = document.createElement('div');
    wrap.className = 'space-y-3';

    // Group questions into display blocks
    ex.questions.forEach(q => {
        const card = document.createElement('div');
        card.className = 'p-4 bg-slate-50 rounded-xl border-2 border-slate-100 leading-loose font-bold text-slate-800';

        q.parts.forEach(p => {
            if (p.text) {
                const span = document.createElement('span');
                span.textContent = p.text;
                card.appendChild(span);
            } else if (p.slotId) {
                const saved = getAnswer(q.id, p.slotId);
                const sel = document.createElement('select');
                sel.className = 'slot-select' + (revealed ? (saved === p.answer ? ' correct' : ' wrong') : (saved ? ' answered' : ''));

                const def = document.createElement('option');
                def.value = '';
                def.textContent = revealed ? p.answer : '？';
                sel.appendChild(def);

                const shuffledPuncs = shuffle(p.options);
                shuffledPuncs.forEach(o => {
                    const oel = document.createElement('option');
                    oel.value = o; oel.textContent = o;
                    if (revealed ? o === p.answer : o === saved) oel.selected = true;
                    sel.appendChild(oel);
                });

                if (revealed) sel.disabled = true;
                else sel.onchange = () => {
                    playSound('click');
                    setAnswer(q.id, sel.value, p.slotId);
                    sel.className = 'slot-select answered';
                    setMascot('thinking', `標點符號選了「\${sel.value}」！繼續！`);
                };
                card.appendChild(sel);
            }
        });

        ws.appendChild(card);
    });
}

// --- RENDER: REORDER ---
function renderReorder(ex, ws) {
    const wrap = document.createElement('div');
    wrap.className = 'space-y-5';

    ex.questions.forEach((q, i) => {
        if (!reorderState[q.id]) reorderState[q.id] = [];

        const card = document.createElement('div');
        card.className = 'p-5 rounded-2xl border-2 border-slate-100 bg-slate-50/50 space-y-3';

        const header = document.createElement('div');
        header.className = 'flex items-center justify-between';
        header.innerHTML = `
            <div class="flex items-center gap-2">
                <span class="bg-purple-500 text-white text-xs font-black rounded-full w-5 h-5 flex items-center justify-center">\${i+1}</span>
                <span class="font-black text-slate-700">請排列成通順的句子：</span>
            </div>
            \${!revealed ? `<button onclick="clearReorder('\${q.id}')" class="text-xs text-red-500 bg-red-50 border border-red-200 px-2 py-1 rounded-full hover:bg-red-100 font-bold"><i class="fa-solid fa-rotate-left"></i> 清除</button>` : ''}
        `;
        card.appendChild(header);

        // Target zone
        const target = document.createElement('div');
        target.id = `rtarget-\${q.id}`;
        target.className = 'min-h-16 p-3 rounded-xl border-2 border-dashed border-purple-200 bg-purple-50/20 flex flex-wrap gap-2 items-center';
        card.appendChild(target);

        // Source zone
        const source = document.createElement('div');
        source.className = 'flex flex-wrap gap-2 justify-center pt-1';

        const pool = shuffle(q.words.map((w, idx) => ({ w, idx })));
        pool.forEach(item => {
            const btn = document.createElement('button');
            btn.id = `rbubble-\${q.id}-\${item.idx}`;
            const alreadySelected = reorderState[q.id].some(s => s.idx === item.idx);

            if (revealed || alreadySelected) {
                btn.className = 'bg-slate-100 text-slate-400 border-2 border-slate-200 px-4 py-2 rounded-xl font-black text-sm opacity-50 cursor-not-allowed';
                btn.disabled = true;
            } else {
                btn.className = 'bg-white text-purple-800 border-2 border-purple-200 px-4 py-2 rounded-xl font-black text-sm hover:bg-purple-50 hover:-translate-y-0.5 transition-all btn-press';
                btn.onclick = () => clickReorder(q.id, item.idx, item.w);
            }
            btn.textContent = item.w;
            source.appendChild(btn);
        });
        card.appendChild(source);

        if (q.hint && !revealed) {
            const hintEl = document.createElement('p');
            hintEl.className = 'text-xs text-purple-400 font-bold flex items-center gap-1';
            hintEl.innerHTML = `<i class="fa-solid fa-lightbulb"></i> 提示：\${q.hint}`;
            card.appendChild(hintEl);
        }

        wrap.appendChild(card);

        setTimeout(() => {
            const t = document.getElementById(`rtarget-\${q.id}`);
            if (!t) return;
            if (revealed) {
                t.innerHTML = '';
                q.correct.forEach(w => {
                    const b = document.createElement('div');
                    b.className = 'bg-emerald-500 text-white font-black px-4 py-2 rounded-xl shadow';
                    b.textContent = w;
                    t.appendChild(b);
                });
            } else {
                renderReorderTarget(q.id);
            }
        }, 10);
    });
    ws.appendChild(wrap);
}

function clickReorder(qId, idx, word) {
    if (revealed) return;
    playSound('click');
    const list = reorderState[qId] || [];
    const existing = list.findIndex(s => s.idx === idx);

    if (existing > -1) {
        list.splice(existing, 1);
        const btn = document.getElementById(`rbubble-\${qId}-\${idx}`);
        if (btn) {
            btn.className = 'bg-white text-purple-800 border-2 border-purple-200 px-4 py-2 rounded-xl font-black text-sm hover:bg-purple-50 transition-all btn-press';
            btn.disabled = false;
            btn.onclick = () => clickReorder(qId, idx, word);
        }
    } else {
        list.push({ idx, w: word });
        const btn = document.getElementById(`rbubble-\${qId}-\${idx}`);
        if (btn) { btn.className = 'bg-slate-100 text-slate-400 border-2 border-slate-200 px-4 py-2 rounded-xl font-black text-sm opacity-50 cursor-not-allowed'; btn.disabled = true; }
    }

    reorderState[qId] = list;
    renderReorderTarget(qId);
}

function renderReorderTarget(qId) {
    const t = document.getElementById(`rtarget-\${qId}`);
    if (!t) return;
    const list = reorderState[qId] || [];
    if (list.length === 0) {
        t.innerHTML = '<span class="text-xs text-slate-400 italic">點選下方詞語卡片，句子會自動拼合！</span>';
        return;
    }
    t.innerHTML = '';
    list.forEach(item => {
        const b = document.createElement('div');
        b.className = 'bg-gradient-to-r from-purple-500 to-pink-500 text-white font-black px-4 py-2 rounded-xl flex items-center gap-2';
        b.innerHTML = `
            <span>\${item.w}</span>
            <button onclick="clickReorder('\${qId}', \${item.idx}, '\${item.w.replace(/'/g,"$'")}'); event.stopPropagation();" class="text-pink-200 hover:text-white">
                <i class="fa-solid fa-xmark"></i>
            </button>
        `;
        t.appendChild(b);
    });
}

function clearReorder(qId) {
    playSound('click');
    const list = reorderState[qId] || [];
    list.forEach(item => {
        const btn = document.getElementById(`rbubble-\${qId}-\${item.idx}`);
        if (btn) {
            btn.className = 'bg-white text-purple-800 border-2 border-purple-200 px-4 py-2 rounded-xl font-black text-sm hover:bg-purple-50 transition-all btn-press';
            btn.disabled = false;
            btn.onclick = () => clickReorder(qId, item.idx, item.w);
        }
    });
    reorderState[qId] = [];
    renderReorderTarget(qId);
}

// --- RENDER: READING COMP ---
function renderReading(ex, ws) {
    const wrap = document.createElement('div');
    wrap.className = 'space-y-5';

    // Passage card
    const pCard = document.createElement('div');
    pCard.className = 'p-5 bg-gradient-to-br from-purple-50 to-pink-50 border-2 border-purple-200 rounded-2xl space-y-3';
    pCard.innerHTML = `
        <div class="flex items-center justify-between flex-wrap gap-2">
            <span class="bg-purple-600 text-white text-xs font-black px-3 py-1 rounded-full"><i class="fa-solid fa-book-open mr-1"></i> 閱讀短文</span>
            <button onclick="speakText('\${ex.passage.replace(/\n/g,' ').replace(/'/g,"$'")}');" class="text-xs text-purple-700 bg-white border border-purple-300 px-3 py-1 rounded-full hover:bg-purple-50 font-bold flex items-center gap-1">
                <i class="fa-solid fa-volume-high"></i> 朗讀全文
            </button>

    ex.questions.forEach((q, i) => {

        const saved = getAnswer(q.id);
        card.innerHTML = `
            <div class="flex items-start justify-between gap-2 flex-wrap">
                <div class="flex items-start gap-2 flex-grow">
                    <span class="bg-purple-500 text-white text-xs font-black rounded-full w-5 h-5 flex items-center justify-center flex-shrink-0 mt-0.5">\${i+1}</span>
                    <p class="font-bold text-slate-800">\${q.qText}</p>
                </div>
                <button onclick="speakText('\${q.qText.replace(/'/g,"$'")}');" class="text-xs text-purple-600 bg-purple-50 border border-purple-200 px-2 py-1 rounded-full flex items-center gap-1 hover:bg-purple-100 font-bold flex-shrink-0">
                    <i class="fa-solid fa-volume-high"></i> 讀問題
                </button>
            </div>
        `;

        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-1 md:grid-cols-3 gap-2';
        const opts = shuffle(q.options);
        opts.forEach(opt => {
            const btn = document.createElement('button');
            let cls = 'py-3 px-4 rounded-xl border-2 font-bold text-left text-sm transition-all btn-press ';
            if (revealed) {
                if (opt === q.answer) cls += 'bg-emerald-500 text-white border-emerald-600';
                else if (opt === saved) cls += 'bg-red-400 text-white border-red-500';
                else cls += 'bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed';
                btn.disabled = true;
            } else if (saved === opt) {
                cls += 'bg-purple-500 text-white border-purple-600';
            } else {
                cls += 'bg-white text-slate-700 border-slate-200 hover:bg-purple-50';
            }
            btn.className = cls;
            btn.textContent = opt;
            if (!revealed) btn.onclick = () => pickReading(q.id, opt);
            grid.appendChild(btn);
        });
        card.appendChild(grid);
        wrap.appendChild(card);
    });
    ws.appendChild(wrap);
}

function pickReading(qId, val) {
    if (revealed) return;
    playSound('click');
    setAnswer(qId, val);
    loadExercise(currentDay);
    setMascot('thinking', `你覺得答案是「\${val}」，想清楚再提交哦！`);
}

// --- CLEAR DAY ---
function clearDay() {
    playSound('click');
    const key = `\${currentDay}_`;
    Object.keys(userAnswers).forEach(k => { if (k.startsWith(key)) delete userAnswers[k]; });
    reorderState = {};
    revealed = false;
    loadExercise(currentDay);
    setMascot('neutral', '🗑️ 已清除今天的答案，重新填寫吧！');
}

// --- SUBMIT & VALIDATE ---
function submitAnswers() {
    const ex = exercises[currentDay];
    if (!ex) return;

    let total = 0, correct = 0;

    if (ex.type === 'cloze' || ex.type === 'reading_comp') {
        ex.questions.forEach(q => {
            total++;
            if (getAnswer(q.id) === q.answer) correct++;
        });
    } else if (ex.type === 'pairing') {
        ex.questions.forEach(q => {
            total++;
            const allMatch = q.answers.every((a, i) => getAnswer(q.id, i) === a);
            if (allMatch) correct++;
        });
    } else if (ex.type === 'punctuation') {
        ex.questions.forEach(q => {
            total++;
            const slots = q.parts.filter(p => p.slotId);
            const allMatch = slots.every(s => getAnswer(q.id, s.slotId) === s.answer);
            if (allMatch) correct++;
        });
    } else if (ex.type === 'reorder') {
        ex.questions.forEach(q => {
            total++;
            const userSeq = (reorderState[q.id] || []).map(s => s.w).join('');
            const correctSeq = q.correct.join('');
            if (userSeq === correctSeq) correct++;
        });
    }

    const allCorrect = correct === total;
    revealed = true;
    loadExercise(currentDay);

    if (allCorrect) {
        playSound('correct');
        progress[currentDay] = true;
        saveState();
        buildCalendar();
        setMascot('happy', `🌟 全部答對了！Hayden 和 Celine 為你歡呼！你太棒了！`);
        document.getElementById('status-msg').classList.remove('hidden');
        speakText('答對了，做得非常好！');
        triggerConfetti();
        showModal(`第 \${currentDay} 天完成！🌟`, `你答對了全部 \${total} 題！Hayden 和 Celine 為你鼓掌！繼續加油！`);
    } else {
        playSound('wrong');
        setMascot('sad', `💪 答對了 \${correct} / \${total} 題。不要灰心！看看正確答案，下次一定更好！`);
        speakText(`答對了\${correct}題，唔緊要，睇下正確答案，繼續努力！`);
    }
}

// --- NEXT DAY ---
function goNext() {
    if (currentDay < 14) {
        currentDay++;
        revealed = false;
        reorderState = {};
        buildCalendar();
        loadExercise(currentDay);
        setMascot('thinking', `📅 第 \${currentDay} 天開始了！Hayden 和 Celine 陪你一起！`);
    } else {
        finalDone = true;
        playSound('correct');
        setMascot('happy', '🏆 恭喜！你完成了所有14天挑戰！你是中文小達人！');
        triggerConfetti();
        showModal('🏆 全部完成！', '恭喜你完成了HAYDEN & CELINE中文樂全部14天挑戰！你真的太棒了！');
    }
}

// --- MASCOT ---
function setMascot(state, msg) {
    document.getElementById('mascot-msg').textContent = msg;
    const hEyes = document.getElementById('h-eyes');
    const cEyes = document.getElementById('c-eyes');
    const hMouth = document.getElementById('h-mouth');
    const cMouth = document.getElementById('c-mouth');

    if (state === 'happy') {
        const happyEyes = `
            <path d="M28 28 Q33 22 38 28" fill="none" stroke="#2D3748" stroke-width="4" stroke-linecap="round"/>
            <path d="M42 28 Q47 22 52 28" fill="none" stroke="#2D3748" stroke-width="4" stroke-linecap="round"/>
        `;
        const happyMouth = `<path d="M33 36 Q40 44 47 36 Z" fill="#FF8A8A" stroke="#2D3748" stroke-width="2"/>`;
        if (hEyes) hEyes.innerHTML = happyEyes;
        if (cEyes) cEyes.innerHTML = happyEyes;
        if (hMouth) hMouth.innerHTML = happyMouth;
        if (cMouth) cMouth.innerHTML = happyMouth;
    } else if (state === 'sad') {
        const sadEyes = `
            <line x1="28" y1="25" x2="36" y2="31" stroke="#2D3748" stroke-width="4" stroke-linecap="round"/>
            <line x1="52" y1="25" x2="44" y2="31" stroke="#2D3748" stroke-width="4" stroke-linecap="round"/>
        `;
        const sadMouth = `<path d="M34 40 Q40 34 46 40" fill="none" stroke="#2D3748" stroke-width="3" stroke-linecap="round"/>`;
        if (hEyes) hEyes.innerHTML = sadEyes;
        if (cEyes) cEyes.innerHTML = sadEyes;
        if (hMouth) hMouth.innerHTML = sadMouth;
        if (cMouth) cMouth.innerHTML = sadMouth;
    } else if (state === 'thinking') {
        const thinkEyes = `
            <circle cx="33" cy="28" r="3.5" fill="#2D3748"/>
            <circle cx="47" cy="28" r="3.5" fill="#2D3748"/>
            <circle cx="32" cy="27" r="1.2" fill="white"/>
            <circle cx="46" cy="27" r="1.2" fill="white"/>
        `;
        const thinkMouth = `<path d="M35 37 L45 37" stroke="#2D3748" stroke-width="2.5" stroke-linecap="round"/>`;
        if (hEyes) hEyes.innerHTML = thinkEyes;
        if (cEyes) cEyes.innerHTML = thinkEyes;
        if (hMouth) hMouth.innerHTML = thinkMouth;
        if (cMouth) cMouth.innerHTML = thinkMouth;
    } else {
        const defEyes = `
            <circle cx="33" cy="28" r="3.5" fill="#2D3748"/>
            <circle cx="47" cy="28" r="3.5" fill="#2D3748"/>
            <circle cx="32" cy="27" r="1.2" fill="white"/>
            <circle cx="46" cy="27" r="1.2" fill="white"/>
        `;
        const defMouth = `<path d="M35 36 Q40 41 45 36" fill="none" stroke="#2D3748" stroke-width="2.5" stroke-linecap="round"/>`;
        if (hEyes) hEyes.innerHTML = defEyes;
        if (cEyes) cEyes.innerHTML = defEyes;
        if (hMouth) hMouth.innerHTML = defMouth;
        if (cMouth) cMouth.innerHTML = defMouth;
    }
}

// --- MODAL ---
function showModal(title, body) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').textContent = body;
    document.getElementById('reward-modal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('reward-modal').classList.add('hidden');
    if (!finalDone && currentDay < 14) goNext();
}

// --- CONFETTI ---
function triggerConfetti() {
    const area = document.getElementById('confetti-area');
    area.innerHTML = '';
    const colors = ['#a855f7','#ec4899','#f59e0b','#3b82f6','#10b981'];
    for (let i = 0; i < 40; i++) {
        const el = document.createElement('div');
        el.style.cssText = `
            position:absolute;
            left:\${Math.random()*100}%;
            top:\${Math.random()*100}%;
            width:\${Math.random()*10+5}px;
            height:\${Math.random()*10+5}px;
            background:\${colors[Math.floor(Math.random()*colors.length)]};
            border-radius:\${Math.random()>0.5?'50%':'3px'};
            animation:ping \${Math.random()*1.5+0.5}s ease infinite;
            opacity:0.8;
        `;
        area.appendChild(el);
    }
}
